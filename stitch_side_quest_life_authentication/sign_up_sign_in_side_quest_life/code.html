<!-- Decorative Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-20">
<span class="material-symbols-outlined absolute top-[10%] left-[10%] text-primary-fixed-dim text-4xl transform -rotate-12">swords</span>
<span class="material-symbols-outlined absolute top-[25%] right-[15%] text-secondary-fixed-dim text-3xl transform rotate-12">shield</span>
<span class="material-symbols-outlined absolute bottom-[20%] left-[15%] text-tertiary-fixed-dim text-4xl transform rotate-45">star</span>
<span class="material-symbols-outlined absolute bottom-[40%] right-[10%] text-primary text-2xl animate-pulse" style="font-variation-settings: 'FILL' 1;">brightness_high</span>
</div>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-md px-6 py-12 flex flex-col min-h-screen">
<!-- Header Section -->
<header class="flex flex-col items-center mb-10">
<div class="w-16 h-16 rounded-xl bg-surface-container-highest flex items-center justify-center mb-4 fantasy-hud-glow border border-primary-container/20">
<div class="relative">
<span class="material-symbols-outlined text-4xl text-primary-container">swords</span>
<span class="material-symbols-outlined absolute -bottom-1 -right-1 text-2xl text-secondary-fixed-dim" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h1 class="font-headline font-bold text-3xl tracking-widest text-primary uppercase text-center mb-2">
                SIDE QUEST LIFE
            </h1>
<p class="font-body text-sm tracking-wide text-slate-400 font-medium italic">
                Turn your life into a game.
            </p>
</header>
<!-- Form Section -->
<div class="flex flex-col gap-5 w-full">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<div class="group relative flex items-center transition-all duration-300 input-focus-glow bg-surface-container-lowest rounded-DEFAULT border border-outline-variant/10">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary-container transition-colors">mail</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-DEFAULT font-body text-sm" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="group relative flex items-center transition-all duration-300 input-focus-glow bg-surface-container-lowest rounded-DEFAULT border border-outline-variant/10">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-DEFAULT font-body text-sm" placeholder="Enter your password" type="password"/>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-2">
<div class="group relative flex items-center transition-all duration-300 input-focus-glow bg-surface-container-lowest rounded-DEFAULT border border-outline-variant/10">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary-container transition-colors">verified_user</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-DEFAULT font-body text-sm" placeholder="Confirm your password" type="password"/>
</div>
</div>
<!-- Checkboxes -->
<div class="flex flex-col gap-4 mt-2">
<label class="flex items-start gap-3 cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input class="peer h-5 w-5 rounded border-outline-variant bg-surface-container-high text-primary-container focus:ring-offset-background focus:ring-primary-container" type="checkbox"/>
</div>
<span class="text-sm text-slate-400 font-medium select-none">
                        I agree to the <a class="text-primary-fixed-dim hover:text-primary transition-colors underline underline-offset-4" href="#">Terms &amp; Conditions</a>
</span>
</label>
<label class="flex items-start gap-3 cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input class="peer h-5 w-5 rounded border-outline-variant bg-surface-container-high text-primary-container focus:ring-offset-background focus:ring-primary-container" type="checkbox"/>
</div>
<span class="text-sm text-slate-400 font-medium select-none">
                        I agree to photo verification for task completion
                    </span>
</label>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4 mt-6">
<button class="w-full py-4 rounded-DEFAULT bg-gradient-to-r from-primary-container to-primary text-on-primary-container font-headline font-bold text-lg tracking-wider uppercase shadow-[0_0_20px_rgba(0,242,255,0.25)] hover:shadow-[0_0_30px_rgba(0,242,255,0.4)] transition-all duration-300 active:scale-[0.98]">
                    Start Your Journey
                </button>
<button class="w-full py-2 text-sm font-medium text-slate-400 hover:text-primary transition-colors">
                    Already have an account? <span class="text-primary-fixed-dim font-bold">Log In</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline/40 uppercase tracking-[0.2em]">or continue with</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">

<span class="text-sm font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 rounded-DEFAULT bg-surface-container-high border border-outline-variant/10 hover:bg-surface-bright transition-colors group">
<span class="material-symbols-outlined text-on-surface text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-semibold text-on-surface">Apple</span>
</button>
</div>

<footer class="mt-auto pt-10 text-center">
<p class="text-[10px] uppercase tracking-widest text-outline/60 font-label">
                By continuing, you accept our 
                <a class="text-primary-fixed-dim underline underline-offset-2 decoration-primary-container/30 hover:decoration-primary-container transition-all" href="#">privacy policy</a>
</p>
<div class="mt-6 flex justify-center items-center gap-1 opacity-20">
<div class="w-1 h-1 rounded-full bg-primary"></div>
<div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-primary to-transparent"></div>
<div class="w-1 h-1 rounded-full bg-primary"></div>
</div>
</footer>
</main>
<!-- Content Separation Tonal Gradient -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface-container-lowest to-transparent pointer-events-none"></div>
