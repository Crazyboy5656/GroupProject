<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Quest - Side Quest Life</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed": "#ffe16d",
                    "secondary": "#f5fff4",
                    "primary-fixed-dim": "#00dbe7",
                    "outline-variant": "#3a494b",
                    "on-surface-variant": "#b9cacb",
                    "tertiary-fixed-dim": "#e9c400",
                    "on-tertiary-container": "#715e00",
                    "primary": "#e1fdff",
                    "secondary-container": "#16ff9e",
                    "on-secondary": "#00391f",
                    "surface": "#10102a",
                    "surface-dim": "#10102a",
                    "outline": "#849495",
                    "primary-container": "#00f2ff",
                    "on-secondary-fixed": "#002110",
                    "error-container": "#93000a",
                    "on-secondary-container": "#007243",
                    "inverse-surface": "#e2dfff",
                    "surface-container-high": "#272742",
                    "inverse-on-surface": "#2e2e49",
                    "on-tertiary": "#3a3000",
                    "on-error": "#690005",
                    "surface-bright": "#363752",
                    "on-primary-fixed-variant": "#004f54",
                    "on-background": "#e2dfff",
                    "background": "#10102a",
                    "surface-tint": "#00dbe7",
                    "on-tertiary-fixed-variant": "#544600",
                    "surface-container": "#1d1d37",
                    "on-tertiary-fixed": "#221b00",
                    "surface-container-low": "#191933",
                    "inverse-primary": "#00696f",
                    "primary-fixed": "#74f5ff",
                    "error": "#ffb4ab",
                    "on-primary-container": "#006a71",
                    "on-primary": "#00363a",
                    "secondary-fixed": "#56ffa8",
                    "tertiary-container": "#ffd81d",
                    "secondary-fixed-dim": "#00e38b",
                    "on-primary-fixed": "#002022",
                    "surface-container-lowest": "#0b0b25",
                    "on-surface": "#e2dfff",
                    "on-secondary-fixed-variant": "#00522f",
                    "tertiary": "#fff6e4",
                    "surface-variant": "#32324e",
                    "surface-container-highest": "#32324e"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background: radial-gradient(circle at top center, #1d1d37 0%, #10102a 100%);
            -webkit-tap-highlight-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 255, 0.2);
            border-radius: 10px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #ffd81d;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 216, 29, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-slate-950/80 backdrop-blur-xl fixed top-0 w-full z-50 tonal-shift bg-slate-900/50 shadow-[0_0_20px_rgba(0,242,255,0.08)]">
<div class="flex items-center justify-between px-6 h-16">
<button class="text-cyan-400 active:scale-95 duration-200">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-cyan-300 font-space-grotesk tracking-widest uppercase text-xl font-bold">NEW QUEST</h1>
<button class="text-cyan-400 active:scale-95 duration-200">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Form Container -->
<div class="space-y-8">
<!-- Quest Title Section -->
<section class="space-y-3">
<label class="font-headline text-primary-fixed tracking-wider uppercase text-xs font-semibold ml-1">Quest Title</label>
<div class="bg-surface-container-lowest p-1 rounded-DEFAULT ring-1 ring-outline-variant/10 focus-within:ring-primary-container/30 transition-all">
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-outline-variant focus:ring-0 px-4 py-3 text-lg font-medium" placeholder="e.g., Study Physics 1 hour" type="text"/>
</div>
</section>
<!-- Description Section -->
<section class="space-y-3">
<label class="font-headline text-primary-fixed tracking-wider uppercase text-xs font-semibold ml-1">Description</label>
<div class="bg-surface-container-lowest p-1 rounded-DEFAULT ring-1 ring-outline-variant/10 focus-within:ring-primary-container/30 transition-all">
<textarea class="w-full bg-transparent border-none text-on-surface placeholder:text-outline-variant focus:ring-0 px-4 py-3 resize-none custom-scrollbar" placeholder="Optional details..." rows="3"></textarea>
</div>
</section>
<!-- Attribute Selection -->
<section class="space-y-4">
<label class="font-headline text-primary-fixed tracking-wider uppercase text-xs font-semibold ml-1">Select Attribute</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-container-low ring-1 ring-outline-variant/10 hover:bg-surface-container-high transition-all group">
<span class="material-symbols-outlined text-secondary mb-2 group-hover:scale-110 duration-200">fitness_center</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant">Strength</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-container-highest ring-2 ring-primary-container/50 shadow-[0_0_15px_rgba(0,242,255,0.2)] transition-all">
<span class="material-symbols-outlined text-primary-container mb-2" style="font-variation-settings: 'FILL' 1;">psychology</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-primary-container">Intelligence</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-container-low ring-1 ring-outline-variant/10 hover:bg-surface-container-high transition-all group">
<span class="material-symbols-outlined text-tertiary-fixed-dim mb-2 group-hover:scale-110 duration-200">shield</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant">Discipline</span>
</button>
</div>
</section>
<!-- XP Reward Slider -->
<section class="bg-surface-container-low p-6 rounded-lg space-y-6">
<div class="flex justify-between items-end">
<label class="font-headline text-primary-fixed tracking-wider uppercase text-xs font-semibold">XP Reward</label>
<div class="text-right">
<span class="text-3xl font-headline font-bold text-tertiary-container drop-shadow-[0_0_8px_rgba(255,216,29,0.4)]">125</span>
<span class="text-xs font-bold text-outline-variant ml-1">XP</span>
</div>
</div>
<div class="relative w-full h-2 bg-surface-container-highest rounded-full overflow-visible">
<div class="absolute top-0 left-0 h-full w-[60%] bg-gradient-to-r from-tertiary-fixed-dim to-tertiary-container rounded-full shadow-[0_0_10px_rgba(255,216,29,0.3)]"></div>
<input class="absolute -top-2 w-full h-6 appearance-none bg-transparent cursor-pointer z-10" max="200" min="10" type="range" value="125"/>
</div>
<div class="flex justify-between text-[10px] font-bold text-outline-variant tracking-widest">
<span>10 XP</span>
<span>200 XP</span>
</div>
</section>
<!-- Difficulty Selector -->
<section class="space-y-3">
<label class="font-headline text-primary-fixed tracking-wider uppercase text-xs font-semibold ml-1">Difficulty</label>
<div class="flex bg-surface-container-lowest p-1 rounded-full ring-1 ring-outline-variant/20">
<button class="flex-1 py-2 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Easy</button>
<button class="flex-1 py-2 text-xs font-bold uppercase tracking-widest bg-surface-container-highest text-on-surface rounded-full shadow-lg">Medium</button>
<button class="flex-1 py-2 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Hard</button>
</div>
</section>
<!-- Scheduling -->
<section class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-4 rounded-lg flex items-center space-x-3">
<span class="material-symbols-outlined text-primary-fixed-dim">calendar_today</span>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase text-outline-variant">Date</span>
<span class="text-sm font-semibold">Today</span>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded-lg flex items-center justify-between">
<div class="flex items-center space-x-3">
<span class="material-symbols-outlined text-secondary-fixed">repeat</span>
<span class="text-[10px] font-bold uppercase text-outline-variant leading-none">Repeat</span>
</div>
<div class="w-10 h-5 bg-secondary-container/20 rounded-full relative">
<div class="absolute right-0.5 top-0.5 w-4 h-4 bg-secondary-container rounded-full shadow-[0_0_8px_rgba(22,255,158,0.5)]"></div>
</div>
</div>
</section>
</div>
<!-- Create Button Container -->
<div class="fixed bottom-0 left-0 w-full p-6 pb-8 bg-gradient-to-t from-surface via-surface/90 to-transparent">
<button class="w-full py-4 rounded-DEFAULT bg-gradient-to-r from-primary-container to-[#a855f7] text-slate-950 font-headline font-extrabold tracking-widest uppercase shadow-[0_0_30px_rgba(0,242,255,0.3)] active:scale-95 transition-transform duration-200">
                Create Quest
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[32px] bg-slate-950/90 backdrop-blur-2xl tonal-shift bg-slate-900/40 shadow-[0_-10px_40px_rgba(0,242,255,0.05)] md:hidden">
<div class="flex justify-around items-center px-8 h-20 pb-safe">
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-cyan-300 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined">style</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-cyan-300 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined">swords</span>
</button>
<button class="flex flex-col items-center justify-center bg-gradient-to-tr from-cyan-500 to-cyan-200 text-slate-950 rounded-full p-3 shadow-[0_0_15px_rgba(0,242,255,0.5)] active:scale-90 duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-cyan-300 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined">person</span>
</button>
</div>
</nav>
<!-- Subtle Background Iconography -->
<div class="fixed inset-0 pointer-events-none overflow-hidden opacity-5 z-0">
<div class="absolute top-20 left-10 transform -rotate-12">
<span class="material-symbols-outlined text-[120px]">swords</span>
</div>
<div class="absolute bottom-40 right-[-20px] transform rotate-45">
<span class="material-symbols-outlined text-[180px]">auto_awesome</span>
</div>
<div class="absolute top-1/2 left-[-40px] transform -rotate-90">
<span class="material-symbols-outlined text-[150px]">fort</span>
</div>
</div>
</body></html>
